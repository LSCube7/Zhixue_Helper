<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" role="img" aria-labelledby="title desc">
  <title id="title">Owl Insight Chrome Web Store small promo tile</title>
  <desc id="desc">Owl Insight logo, wordmark, and an abstract score trend on a violet background.</desc>
  <defs>
    <linearGradient id="background" x1="28" y1="18" x2="414" y2="267" gradientUnits="userSpaceOnUse">
