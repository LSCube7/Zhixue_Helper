      <stop offset="0.52" stop-color="#33245D"/>
      <stop offset="1" stop-color="#1A53D6"/>
    </linearGradient>
    <linearGradient id="panel" x1="248" y1="56" x2="405" y2="226" gradientUnits="userSpaceOnUse">
