<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Owl Insight Chrome Web Store marquee</title>
  <desc id="desc">Owl Insight branding with abstract score analysis dashboard cards and a demo mode badge.</desc>
  <defs>
    <linearGradient id="background" x1="64" y1="24" x2="1340" y2="548" gradientUnits="userSpaceOnUse">
